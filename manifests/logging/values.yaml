loki:
  auth_enabled: false
  server:
    http_listen_port: 3100
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: 2020-09-07
        index:
          prefix: index_
          period: 24h
        object_store: filesystem
        store: boltdb-shipper
        schema: v11
  persistence:
    enabled: true
    storageClassName: nfs-storage
    size: 10Gi

promtail:
  enabled: true
  config:
    logLevel: info
    serverPort: 3101
    clients:
      - url: http://loki:3100/loki/api/v1/push
