# K8s NodePort Services
# 用于局域网访问

---
# ArgoCD NodePort
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    name: http
  - port: 8443
    targetPort: 8443
    nodePort: 30443
    name: https

---
# Jenkins NodePort
apiVersion: v1
kind: Service
metadata:
  name: jenkins-nodeport
  namespace: jenkins
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: jenkins
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30088
    name: http

---
# Grafana NodePort
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: kube-prometheus-stack
  ports:
  - port: 80
    targetPort: 3000
    nodePort: 30090
    name: http

---
# Prometheus NodePort
apiVersion: v1
kind: Service
metadata:
  name: prometheus-nodeport
  namespace: monitoring
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: prometheus
    operator.prometheus.io/name: kube-prometheus-stack-prometheus
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30091
    name: http

---
# Loki NodePort
apiVersion: v1
kind: Service
metadata:
  name: loki-nodeport
  namespace: logging
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
  ports:
  - port: 3100
    targetPort: 3100
    nodePort: 30092
    name: http